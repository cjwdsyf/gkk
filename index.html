<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>几何涂色实验室 | 智能移出/移回 · 三面涂色修复 · 10x10x10网格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #ffffff;
            color: #1e293b;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            touch-action: pan-x pan-y;
        }
        #toolbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }
        .row-primary {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .custom-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f8fafc;
            padding: 4px 12px 4px 8px;
            border-radius: 48px;
            border: 1px solid #e2e8f0;
        }
        .custom-group input {
            width: 60px;
            padding: 8px 0;
            text-align: center;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-size: 13px;
        }
        .custom-group button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .action-btn {
            background: #334155;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }
        .undo-btn {
            background: #f97316;
        }
        .reset-all-btn {
            background: #10b981;
        }
        .toggle-visibility-btn {
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:active { transform: scale(0.96); }
        .row-coloring {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
            transition: all 0.2s ease;
        }
        .row-coloring.hidden {
            display: none;
        }
        .coloring-card {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f8fafc;
            padding: 4px 12px;
            border-radius: 48px;
            border: 1px solid #e2e8f0;
        }
        .coloring-card .mode-btn {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        .coloring-card .mode-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .coloring-card .toggle-btn {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 68px;
        }
        .coloring-card .toggle-btn.in-state {
            background: #bbf7d0;
            border-color: #86efac;
            color: #166534;
        }
        #canvas-container {
            flex: 1;
            position: relative;
            background: #ffffff;
            overflow: hidden;
            touch-action: none;
        }
        .canvas-info {
            position: absolute;
            z-index: 50;
            pointer-events: none;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 12px;
            font-family: monospace;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        #coord { bottom: 16px; left: 16px; }
        #status { top: 16px; left: 16px; background: rgba(0,0,0,0.7); color: white; border: none; }
        #copyright {
            position: fixed;
            bottom: 8px;
            right: 12px;
            font-size: 9px;
            color: rgba(0,0,0,0.35);
            z-index: 200;
            pointer-events: none;
        }
        @media (max-width: 640px) {
            .custom-group input { width: 52px; font-size: 12px; }
            .custom-group button { padding: 6px 12px; }
            .action-btn { padding: 6px 14px; }
            .toggle-visibility-btn { padding: 6px 14px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.min.js"></script>
</head>
<body>
<div id="toolbar">
    <div class="row-primary">
        <div class="custom-group">
            <input type="number" id="customSizeX" value="3" min="1" max="10" placeholder="长">
            <input type="number" id="customSizeY" value="3" min="1" max="10" placeholder="高">
            <input type="number" id="customSizeZ" value="3" min="1" max="10" placeholder="宽">
            <button id="buildBtn">构建</button>
        </div>
        <button id="clearAllBtn" class="action-btn">清除所有</button>
        <button id="resetViewBtn" class="action-btn">重置视图</button>
        <button id="undoBtn" class="action-btn undo-btn">↩️ 撤销</button>
        <button id="resetAllMovedBtn" class="action-btn reset-all-btn">⟳ 全部移回</button>
        <button id="toggleRowBtn" class="toggle-visibility-btn">显示</button>
    </div>
    <div class="row-coloring hidden" id="rowColoring">
        <div class="coloring-card">
            <button id="coloringNormal" class="mode-btn active">全部暴露面</button>
            <button id="normalToggle" class="toggle-btn" data-type="normal">移出</button>
        </div>
        <div class="coloring-card">
            <button id="coloring3Face" class="mode-btn">三面涂色</button>
            <button id="threeToggle" class="toggle-btn" data-type="3face">移出</button>
        </div>
        <div class="coloring-card">
            <button id="coloring2Face" class="mode-btn">两面涂色</button>
            <button id="twoToggle" class="toggle-btn" data-type="2face">移出</button>
        </div>
        <div class="coloring-card">
            <button id="coloring1Face" class="mode-btn">一面涂色</button>
            <button id="oneToggle" class="toggle-btn" data-type="1face">移出</button>
        </div>
    </div>
</div>
<div id="canvas-container">
    <div id="status" class="canvas-info">立方体数量: <span id="cubeCount">0</span> | 单击选中 | 双击单个移除</div>
    <div id="coord" class="canvas-info">✨ 单击高亮，双击垂直向外移出5格 | 分组按钮智能移出/移回 (网格范围 10x10x10)</div>
</div>
<div id="copyright">© 原始暴露面固定 · 新暴露面白色 | 三面涂色移出已修复 | 支持最大10×10×10网格 | 基于当前边界垂直向外移动</div>

<script>
    // ========== 配置 ==========
    const SYSTEM_CONFIG = {
        cellSize: 3.2,
        maxHeight: 10,
        frustumSize: 38.6667,    // 58 / 1.5 = 38.6667，实现初始界面放大1.5倍
        colors: {
            edge: 0x1e293b,
            faceExposed: 0xef4444,
            faceContact: 0xf8fafc,
            highlightEdge: 0xffaa33
        },
        displaceColors: {
            '3face': 0xffaa33,
            '2face': 0x3399ff,
            '1face': 0x44cc44
        },
        gridSizeX: 10,
        gridSizeZ: 10,
        displaceDistance: 5
    };
    const FACE = { RIGHT:0, LEFT:1, UP:2, DOWN:3, FRONT:4, BACK:5 };

    let scene, camera, renderer, controls;
    let cubes = [];
    let removedIndividual = [];
    let selectedCube = null;
    let originalEdgeColor = null;

    let currentColoringMode = 'normal';
    let displacedCubes = new Map();
    let historyStack = [];
    let isOperating = false;

    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();

    // ========== 手机触摸辅助变量 ==========
    let touchStartTime = 0;
    let touchStartX = 0, touchStartY = 0;
    let touchTimeout = null;
    let pendingClick = false;
    const DOUBLE_CLICK_DELAY = 300;
    const MOVE_THRESHOLD = 10;

    // ========== 通用射线检测 ==========
    function getCubeFromScreenCoords(clientX, clientY) {
        const rect = renderer.domElement.getBoundingClientRect();
        const x = ((clientX - rect.left) / rect.width) * 2 - 1;
        const y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
        const intersects = raycaster.intersectObjects(cubes.map(c => c.mesh.children[0]));
        if (intersects.length > 0) return intersects[0].object.parent.userData;
        return null;
    }

    // ========== 辅助函数 ==========
    function getActiveBounds() {
        const active = cubes.filter(c => !c.displaced);
        if (active.length === 0) return null;
        let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity, maxH = 0, minH = Infinity;
        active.forEach(c => {
            minX = Math.min(minX, c.x); maxX = Math.max(maxX, c.x);
            minZ = Math.min(minZ, c.z); maxZ = Math.max(maxZ, c.z);
            maxH = Math.max(maxH, c.height);
            minH = Math.min(minH, c.height);
        });
        return { minX, maxX, minZ, maxZ, minH, maxH };
    }

    function getCubePaintInfo(cube, boundsOverride = null) {
        const bounds = boundsOverride || getActiveBounds();
        if (!bounds) return { type: 'normal', faces: [] };
        const { x, z, height } = cube;
        const onXBound = (x === bounds.minX || x === bounds.maxX);
        const onZBound = (z === bounds.minZ || z === bounds.maxZ);
        const onYBound = (height === bounds.minH || height === bounds.maxH);
        const boundaryCount = (onXBound?1:0) + (onZBound?1:0) + (onYBound?1:0);
        let faces = [];
        if (onXBound) faces.push(x === bounds.minX ? FACE.LEFT : FACE.RIGHT);
        if (onZBound) faces.push(z === bounds.minZ ? FACE.BACK : FACE.FRONT);
        if (onYBound) faces.push(height === bounds.minH ? FACE.DOWN : FACE.UP);
        if (boundaryCount === 3) return { type: '3face', faces };
        if (boundaryCount === 2) return { type: '2face', faces };
        if (boundaryCount === 1) return { type: '1face', faces };
        return { type: 'normal', faces: [] };
    }

    function computeOriginalExposedFaces(cube) {
        const dirs = [
            { dx: 1, dz: 0, dy: 0, face: FACE.RIGHT },
            { dx: -1, dz: 0, dy: 0, face: FACE.LEFT },
            { dx: 0, dz: 0, dy: 1, face: FACE.UP },
            { dx: 0, dz: 0, dy: -1, face: FACE.DOWN },
            { dx: 0, dz: 1, dy: 0, face: FACE.FRONT },
            { dx: 0, dz: -1, dy: 0, face: FACE.BACK }
        ];
        const exposed = [];
        for (const dir of dirs) {
            const neighborX = cube.x + dir.dx;
            const neighborZ = cube.z + dir.dz;
            const neighborH = cube.height + dir.dy;
            const hasNeighbor = cubes.some(c => c.x === neighborX && c.z === neighborZ && c.height === neighborH);
            if (!hasNeighbor) exposed.push(dir.face);
        }
        cube.originalExposedFaces = exposed;
    }

    function computeAllOriginalExposedFacesOnce() {
        cubes.forEach(cube => computeOriginalExposedFaces(cube));
    }

    function applyColoringToNormalCube(cube) {
        if (cube.displaced) return;
        const mats = cube.mesh.children[0].material;
        const originalExposed = cube.originalExposedFaces || [];
        const paintInfo = getCubePaintInfo(cube);
        const isTarget = (currentColoringMode === paintInfo.type);
        for (let i = 0; i < 6; i++) {
            if (!mats[i]?.color) continue;
            if (!originalExposed.includes(i)) {
                mats[i].color.setHex(SYSTEM_CONFIG.colors.faceContact);
                continue;
            }
            if (currentColoringMode === 'normal') {
                mats[i].color.setHex(SYSTEM_CONFIG.colors.faceExposed);
            } else if (isTarget) {
                mats[i].color.setHex(SYSTEM_CONFIG.displaceColors[currentColoringMode]);
            } else {
                mats[i].color.setHex(SYSTEM_CONFIG.colors.faceExposed);
            }
        }
    }

    function refreshActiveCubesColors() {
        cubes.forEach(c => { if(!c.displaced) applyColoringToNormalCube(c); });
    }

    function highlightCube(cube) {
        clearHighlight();
        if (!cube || cube.displaced) return;
        selectedCube = cube;
        const wireframe = cube.mesh.children[1];
        if (wireframe && wireframe.material) {
            originalEdgeColor = wireframe.material.color.getHex();
            wireframe.material.color.setHex(SYSTEM_CONFIG.colors.highlightEdge);
        }
    }

    function clearHighlight() {
        if (selectedCube) {
            const wireframe = selectedCube.mesh.children[1];
            if (wireframe && wireframe.material && originalEdgeColor !== undefined) {
                wireframe.material.color.setHex(originalEdgeColor);
            }
            selectedCube = null;
        }
    }

    function getOutwardTargetPosition(cube) {
        const bounds = getActiveBounds();
        if (!bounds) return cube.mesh.position.clone().add(new THREE.Vector3(0, SYSTEM_CONFIG.cellSize * SYSTEM_CONFIG.displaceDistance, 0));
        
        const { x, z, height } = cube;
        const onXMin = (x === bounds.minX);
        const onXMax = (x === bounds.maxX);
        const onZMin = (z === bounds.minZ);
        const onZMax = (z === bounds.maxZ);
        const onYMin = (height === bounds.minH);
        const onYMax = (height === bounds.maxH);
        
        let dir = new THREE.Vector3(0, 0, 0);
        if ((onXMin || onXMax) && (onZMin || onZMax) && (onYMin || onYMax)) {
            if (onXMin) dir.x = -1;
            else if (onXMax) dir.x = 1;
            if (onZMin) dir.z = -1;
            else if (onZMax) dir.z = 1;
            if (onYMin) dir.y = -1;
            else if (onYMax) dir.y = 1;
            if (dir.length() > 0) dir.normalize();
        }
        else if ((onXMin || onXMax) && (onZMin || onZMax)) {
            if (onXMin) dir.x = -1;
            else if (onXMax) dir.x = 1;
            if (onZMin) dir.z = -1;
            else if (onZMax) dir.z = 1;
            if (dir.length() > 0) dir.normalize();
        }
        else if ((onXMin || onXMax) && (onYMin || onYMax)) {
            if (onXMin) dir.x = -1;
            else if (onXMax) dir.x = 1;
            if (onYMin) dir.y = -1;
            else if (onYMax) dir.y = 1;
            if (dir.length() > 0) dir.normalize();
        }
        else if ((onZMin || onZMax) && (onYMin || onYMax)) {
            if (onZMin) dir.z = -1;
            else if (onZMax) dir.z = 1;
            if (onYMin) dir.y = -1;
            else if (onYMax) dir.y = 1;
            if (dir.length() > 0) dir.normalize();
        }
        else if (onXMin) dir.set(-1, 0, 0);
        else if (onXMax) dir.set(1, 0, 0);
        else if (onZMin) dir.set(0, 0, -1);
        else if (onZMax) dir.set(0, 0, 1);
        else if (onYMin) dir.set(0, -1, 0);
        else if (onYMax) dir.set(0, 1, 0);
        else dir.set(0, 1, 0);
        
        const offset = dir.multiplyScalar(SYSTEM_CONFIG.cellSize * SYSTEM_CONFIG.displaceDistance);
        return cube.mesh.position.clone().add(offset);
    }

    function pushToHistory(cubesInfoArray) {
        historyStack.push({ cubesInfo: cubesInfoArray });
        if (historyStack.length > 50) historyStack.shift();
    }

    function displaceGroupByType(type, cubesToDisplace, recordHistory = true) {
        if (!cubesToDisplace.length) return false;
        const historyEntries = [];
        for (const cube of cubesToDisplace) {
            if (cube.displaced) continue;
            const originalPos = cube.mesh.position.clone();
            historyEntries.push({ cube, originalPos, wasRemovedFromArray: false, displaceType: type });
            cube.displaced = true;
            cube.originalTypeForGroup = type;
            displacedCubes.set(cube.id, { originalWorldPos: originalPos, displaceType: type });
            const targetPos = getOutwardTargetPosition(cube);
            new TWEEN.Tween(cube.mesh.position)
                .to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 480)
                .easing(TWEEN.Easing.Quadratic.InOut)
                .start();
            fixDisplacedCubeColors(cube, type);
        }
        if (recordHistory) pushToHistory(historyEntries);
        refreshActiveCubesColors();
        updateStatus();
        return true;
    }

    function fixDisplacedCubeColors(cube, displaceType) {
        const originalExposed = cube.originalExposedFaces || [];
        let exposedColorHex;
        if (displaceType === 'normal') exposedColorHex = SYSTEM_CONFIG.colors.faceExposed;
        else if (displaceType === '3face') exposedColorHex = SYSTEM_CONFIG.displaceColors['3face'];
        else if (displaceType === '2face') exposedColorHex = SYSTEM_CONFIG.displaceColors['2face'];
        else exposedColorHex = SYSTEM_CONFIG.displaceColors['1face'];
        const mats = cube.mesh.children[0].material;
        for (let i = 0; i < 6; i++) {
            if (!mats[i]?.color) continue;
            if (originalExposed.includes(i)) {
                mats[i].color.setHex(exposedColorHex);
            } else {
                mats[i].color.setHex(SYSTEM_CONFIG.colors.faceContact);
            }
        }
    }

    function getCubesToDisplaceByType(type) {
        const bounds = getActiveBounds();
        if (!bounds) return [];
        if (type === '3face') {
            const candidates = cubes.filter(c => !c.displaced && getCubePaintInfo(c).type === '3face');
            return candidates.map(c => [c]);
        } else if (type === '2face') {
            const groups = [];
            const candidates = cubes.filter(c => !c.displaced && getCubePaintInfo(c).type === '2face');
            const edgeGroups = new Map();
            candidates.forEach(cube => {
                const { x, z, height } = cube;
                const boundsLocal = getActiveBounds();
                if (!boundsLocal) return;
                const onXBound = (x === boundsLocal.minX || x === boundsLocal.maxX);
                const onZBound = (z === boundsLocal.minZ || z === boundsLocal.maxZ);
                const onYBound = (height === boundsLocal.minH || height === boundsLocal.maxH);
                if ((onXBound && onZBound) && !onYBound) {
                    const key = `xEdge_${x}_zEdge_${z}`;
                    if (!edgeGroups.has(key)) edgeGroups.set(key, []);
                    edgeGroups.get(key).push(cube);
                } else if ((onXBound && onYBound) && !onZBound) {
                    const key = `xEdge_${x}_yEdge_${height}`;
                    if (!edgeGroups.has(key)) edgeGroups.set(key, []);
                    edgeGroups.get(key).push(cube);
                } else if ((onZBound && onYBound) && !onXBound) {
                    const key = `zEdge_${z}_yEdge_${height}`;
                    if (!edgeGroups.has(key)) edgeGroups.set(key, []);
                    edgeGroups.get(key).push(cube);
                } else {
                    const key = `single_${cube.id}`;
                    if (!edgeGroups.has(key)) edgeGroups.set(key, []);
                    edgeGroups.get(key).push(cube);
                }
            });
            for (let group of edgeGroups.values()) groups.push(group);
            return groups;
        } else if (type === '1face') {
            const groups = [];
            const candidates = cubes.filter(c => !c.displaced && getCubePaintInfo(c).type === '1face');
            const faceGroups = new Map();
            candidates.forEach(cube => {
                const boundsLocal = getActiveBounds();
                if (!boundsLocal) return;
                const { x, z, height } = cube;
                const onXBound = (x === boundsLocal.minX || x === boundsLocal.maxX);
                const onZBound = (z === boundsLocal.minZ || z === boundsLocal.maxZ);
                const onYBound = (height === boundsLocal.minH || height === boundsLocal.maxH);
                if (onXBound && !onZBound && !onYBound) {
                    const key = `xFace_${x}`;
                    if (!faceGroups.has(key)) faceGroups.set(key, []);
                    faceGroups.get(key).push(cube);
                } else if (onZBound && !onXBound && !onYBound) {
                    const key = `zFace_${z}`;
                    if (!faceGroups.has(key)) faceGroups.set(key, []);
                    faceGroups.get(key).push(cube);
                } else if (onYBound && !onXBound && !onZBound) {
                    const key = `yFace_${height}`;
                    if (!faceGroups.has(key)) faceGroups.set(key, []);
                    faceGroups.get(key).push(cube);
                } else {
                    const key = `single_${cube.id}`;
                    if (!faceGroups.has(key)) faceGroups.set(key, []);
                    faceGroups.get(key).push(cube);
                }
            });
            for (let group of faceGroups.values()) groups.push(group);
            return groups;
        } else if (type === 'normal') {
            const allColored = cubes.filter(c => !c.displaced && getCubePaintInfo(c).type !== 'normal');
            return allColored.map(c => [c]);
        }
        return [];
    }

    async function displaceByType(type) {
        if (isOperating) return;
        isOperating = true;
        try {
            const groups = getCubesToDisplaceByType(type);
            if (groups.length === 0) return;
            for (const group of groups) {
                displaceGroupByType(type, group, true);
                await new Promise(r => setTimeout(r, 20));
            }
            updateToggleButtonsState();
        } finally {
            isOperating = false;
        }
    }

    async function restoreByType(type) {
        if (isOperating) return;
        isOperating = true;
        try {
            const toRestore = cubes.filter(c => c.displaced === true && c.originalTypeForGroup === type);
            if (toRestore.length === 0) return;
            const historyEntries = [];
            for (const cube of toRestore) {
                const originalPosData = displacedCubes.get(cube.id);
                if (!originalPosData) continue;
                const originalPos = originalPosData.originalWorldPos;
                historyEntries.push({ cube, originalPos, wasRemovedFromArray: false, isRestore: true });
                new TWEEN.Tween(cube.mesh.position)
                    .to({ x: originalPos.x, y: originalPos.y, z: originalPos.z }, 420)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .start();
                cube.displaced = false;
                cube.originalTypeForGroup = undefined;
                displacedCubes.delete(cube.id);
            }
            if (historyEntries.length) pushToHistory(historyEntries);
            refreshActiveCubesColors();
            updateStatus();
            updateToggleButtonsState();
        } finally {
            isOperating = false;
        }
    }

    async function removeSingleCube(cube) {
        if (isOperating) return;
        if (!cube || cube.displaced) return;
        if (displacedCubes.has(cube.id)) return;
        isOperating = true;
        try {
            cube._originalPos = cube.mesh.position.clone();
            const idx = cubes.findIndex(c => c.id === cube.id);
            if (idx === -1) return;
            cubes.splice(idx, 1);
            const targetPos = getOutwardTargetPosition(cube);
            await new Promise((resolve) => {
                new TWEEN.Tween(cube.mesh.position)
                    .to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 450)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .onComplete(() => {
                        if (!removedIndividual.includes(cube)) removedIndividual.push(cube);
                        const mats = cube.mesh.children[0].material;
                        for (let i = 0; i < 6; i++) {
                            if (mats[i]) {
                                mats[i].emissive = new THREE.Color(0x222222);
                                mats[i].emissiveIntensity = 0.2;
                            }
                        }
                        resolve();
                    })
                    .start();
            });
            pushToHistory([{ cube, originalPos: cube._originalPos, wasRemovedFromArray: true }]);
            clearHighlight();
            refreshActiveCubesColors();
            updateStatus();
            updateToggleButtonsState();
        } finally {
            isOperating = false;
        }
    }

    async function undo() {
        if (isOperating) return;
        if (historyStack.length === 0) return;
        isOperating = true;
        try {
            const lastOp = historyStack.pop();
            for (const item of lastOp.cubesInfo) {
                const { cube, originalPos, wasRemovedFromArray } = item;
                if (!cube) continue;
                new TWEEN.Tween(cube.mesh.position).to({ x: originalPos.x, y: originalPos.y, z: originalPos.z }, 350).easing(TWEEN.Easing.Quadratic.InOut).start();
                if (wasRemovedFromArray) {
                    if (!cubes.includes(cube)) cubes.push(cube);
                    const idxRemoved = removedIndividual.indexOf(cube);
                    if (idxRemoved !== -1) removedIndividual.splice(idxRemoved, 1);
                    const mats = cube.mesh.children[0].material;
                    for (let i = 0; i < 6; i++) if (mats[i]) { mats[i].emissive = new THREE.Color(0x000000); mats[i].emissiveIntensity = 0; }
                    cube.displaced = false;
                } else {
                    cube.displaced = false;
                    cube.originalTypeForGroup = undefined;
                    displacedCubes.delete(cube.id);
                }
            }
            refreshActiveCubesColors();
            updateStatus();
            clearHighlight();
            updateToggleButtonsState();
        } finally { isOperating = false; }
    }

    async function restoreAllMoved() {
        if (isOperating) return;
        isOperating = true;
        try {
            historyStack = [];
            for (let [id, data] of displacedCubes.entries()) {
                const cube = cubes.find(c => c.id === id);
                if (cube && cube.displaced) {
                    new TWEEN.Tween(cube.mesh.position).to({ x: data.originalWorldPos.x, y: data.originalWorldPos.y, z: data.originalWorldPos.z }, 400).easing(TWEEN.Easing.Quadratic.InOut).start();
                    cube.displaced = false;
                    cube.originalTypeForGroup = undefined;
                }
            }
            displacedCubes.clear();
            for (const cube of removedIndividual) {
                if (cube && cube.mesh) {
                    const orig = cube._originalPos || cube.mesh.position.clone();
                    new TWEEN.Tween(cube.mesh.position).to({ x: orig.x, y: orig.y, z: orig.z }, 400).easing(TWEEN.Easing.Quadratic.InOut).start();
                    if (!cubes.includes(cube)) cubes.push(cube);
                    const mats = cube.mesh.children[0].material;
                    for (let i = 0; i < 6; i++) if (mats[i]) { mats[i].emissive = new THREE.Color(0x000000); mats[i].emissiveIntensity = 0; }
                    cube.displaced = false;
                }
            }
            removedIndividual = [];
            refreshActiveCubesColors();
            updateStatus();
            clearHighlight();
            updateToggleButtonsState();
        } finally { isOperating = false; }
    }

    function updateToggleButtonsState() {
        const types = ['normal', '3face', '2face', '1face'];
        for (const type of types) {
            const hasDisplacedOfType = cubes.some(c => c.displaced === true && c.originalTypeForGroup === type);
            const btn = document.getElementById(type === 'normal' ? 'normalToggle' : (type === '3face' ? 'threeToggle' : (type === '2face' ? 'twoToggle' : 'oneToggle')));
            if (btn) {
                if (hasDisplacedOfType) { btn.innerText = '移回'; btn.classList.add('in-state'); }
                else { btn.innerText = '移出'; btn.classList.remove('in-state'); }
            }
        }
    }
    function toggleDisplace(type) { const hasDisplaced = cubes.some(c => c.displaced === true && c.originalTypeForGroup === type); if (hasDisplaced) restoreByType(type); else displaceByType(type); }

    // ========== 鼠标事件（PC） ==========
    function onMouseClick(event) {
        const cube = getCubeFromScreenCoords(event.clientX, event.clientY);
        if (cube && !cube.displaced && cubes.includes(cube)) {
            highlightCube(cube);
            document.getElementById('coord').innerHTML = `✓ 选中方块 (${cube.x}, ${cube.z}, ${cube.height}) 双击向外移出`;
        } else {
            clearHighlight();
            document.getElementById('coord').innerHTML = `✨ 单击高亮，双击垂直向外移出5格 | 分组按钮智能移回 | 网格10x10x10`;
        }
    }

    function onMouseDoubleClick(event) {
        const cube = getCubeFromScreenCoords(event.clientX, event.clientY);
        if (cube && !cube.displaced && cubes.includes(cube)) {
            removeSingleCube(cube);
            document.getElementById('coord').innerHTML = `✔ 单个方块已垂直移出，可撤销或全部移回`;
        }
    }

    // ========== 手机触摸事件 ==========
    function onTouchStart(e) {
        const touch = e.touches[0];
        touchStartTime = Date.now();
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        if (touchTimeout) clearTimeout(touchTimeout);
        pendingClick = true;
        // 不 preventDefault，让 OrbitControls 正常工作
    }

    function onTouchMove(e) {
        if (!pendingClick) return;
        const touch = e.touches[0];
        const dx = Math.abs(touch.clientX - touchStartX);
        const dy = Math.abs(touch.clientY - touchStartY);
        if (dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD) {
            pendingClick = false;
            if (touchTimeout) clearTimeout(touchTimeout);
        }
    }

    function onTouchEnd(e) {
        if (!pendingClick) { pendingClick = false; return; }
        const endTime = Date.now();
        const duration = endTime - touchStartTime;
        const cube = getCubeFromScreenCoords(touchStartX, touchStartY);
        if (!cube || cube.displaced) { pendingClick = false; return; }
        if (duration < DOUBLE_CLICK_DELAY && touchTimeout === null) {
            touchTimeout = setTimeout(() => {
                if (pendingClick && cube && !cube.displaced && cubes.includes(cube)) {
                    highlightCube(cube);
                    document.getElementById('coord').innerHTML = `✓ 选中方块 (${cube.x}, ${cube.z}, ${cube.height}) 双击向外移出`;
                } else {
                    clearHighlight();
                }
                pendingClick = false;
                touchTimeout = null;
            }, DOUBLE_CLICK_DELAY);
        } else if (touchTimeout !== null) {
            clearTimeout(touchTimeout);
            touchTimeout = null;
            if (cube && !cube.displaced && cubes.includes(cube)) {
                removeSingleCube(cube);
                document.getElementById('coord').innerHTML = `✔ 单个方块已垂直移出，可撤销或全部移回`;
            }
            pendingClick = false;
        } else {
            pendingClick = false;
        }
        e.preventDefault();
    }

    // ========== 构建场景 ==========
    function createCubeMesh() {
        const materials = Array(6).fill().map(() => new THREE.MeshLambertMaterial({ color: SYSTEM_CONFIG.colors.faceExposed, flatShading: true }));
        const geometry = new THREE.BoxGeometry(SYSTEM_CONFIG.cellSize, SYSTEM_CONFIG.cellSize, SYSTEM_CONFIG.cellSize);
        const mesh = new THREE.Mesh(geometry, materials);
        mesh.castShadow = true; mesh.receiveShadow = true;
        const edgesGeo = new THREE.EdgesGeometry(geometry);
        const wire = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: SYSTEM_CONFIG.colors.edge }));
        const group = new THREE.Group();
        group.add(mesh); group.add(wire);
        return group;
    }

    function buildBox(xSize, ySize, zSize) {
        if (isOperating) return;
        clearHighlight();
        restoreAllMoved().then(() => {
            cubes.forEach(c => scene.remove(c.mesh));
            cubes = []; removedIndividual = []; displacedCubes.clear(); historyStack = [];
            if (xSize > SYSTEM_CONFIG.gridSizeX || zSize > SYSTEM_CONFIG.gridSizeZ) { alert(`网格范围不能超过 ${SYSTEM_CONFIG.gridSizeX} x ${SYSTEM_CONFIG.gridSizeZ}`); return; }
            if (ySize > SYSTEM_CONFIG.maxHeight) { alert(`最大高度为 ${SYSTEM_CONFIG.maxHeight}`); return; }
            const w = SYSTEM_CONFIG.gridSizeX * SYSTEM_CONFIG.cellSize;
            const d = SYSTEM_CONFIG.gridSizeZ * SYSTEM_CONFIG.cellSize;
            for (let h = 0; h < ySize; h++) {
                for (let x = 0; x < xSize; x++) {
                    for (let z = 0; z < zSize; z++) {
                        const cubeMesh = createCubeMesh();
                        const xPos = x * SYSTEM_CONFIG.cellSize - w/2 + SYSTEM_CONFIG.cellSize/2;
                        const zPos = z * SYSTEM_CONFIG.cellSize - d/2 + SYSTEM_CONFIG.cellSize/2;
                        const yPos = h * SYSTEM_CONFIG.cellSize + SYSTEM_CONFIG.cellSize/2;
                        cubeMesh.position.set(xPos, yPos, zPos);
                        const id = Date.now() + Math.random() + x*1000 + z*100 + h;
                        const newCube = { mesh: cubeMesh, x, z, height: h+1, id, displaced: false };
                        cubes.push(newCube);
                        cubeMesh.userData = newCube;
                        scene.add(cubeMesh);
                    }
                }
            }
            computeAllOriginalExposedFacesOnce();
            refreshActiveCubesColors();
            updateStatus();
            updateToggleButtonsState();
        });
    }

    function clearAllCubes() {
        if (isOperating) return;
        restoreAllMoved().then(() => {
            cubes.forEach(c => scene.remove(c.mesh));
            cubes = []; removedIndividual = []; displacedCubes.clear(); historyStack = [];
            refreshActiveCubesColors(); updateStatus(); clearHighlight(); updateToggleButtonsState();
        });
    }

    function resetView() { 
        camera.position.set(36, 34, 36); 
        controls.target.set(0,0,0); 
        controls.update(); 
    }
    function updateStatus() { document.getElementById('cubeCount').innerText = cubes.length; }
    function setColoringMode(mode) {
        currentColoringMode = mode;
        refreshActiveCubesColors();
        document.querySelectorAll('.coloring-card .mode-btn').forEach(btn => btn.classList.remove('active'));
        if (mode === 'normal') document.getElementById('coloringNormal').classList.add('active');
        else if (mode === '3face') document.getElementById('coloring3Face').classList.add('active');
        else if (mode === '2face') document.getElementById('coloring2Face').classList.add('active');
        else if (mode === '1face') document.getElementById('coloring1Face').classList.add('active');
    }

    function initLighting() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.add(new THREE.AmbientLight(0xffffff, 0.65));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(18, 28, 12);
        dirLight.castShadow = true;
        scene.add(dirLight);
        scene.add(new THREE.PointLight(0xccddff, 0.4).position.set(-8,12,-10));
    }
    function initCamera() {
        const container = document.getElementById('canvas-container');
        const aspect = container.clientWidth / container.clientHeight;
        camera = new THREE.OrthographicCamera(-SYSTEM_CONFIG.frustumSize * aspect/2, SYSTEM_CONFIG.frustumSize * aspect/2, SYSTEM_CONFIG.frustumSize/2, -SYSTEM_CONFIG.frustumSize/2, 0.1, 200);
        camera.position.set(36, 34, 36);
    }
    function initRenderer() {
        const container = document.getElementById('canvas-container');
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
    }
    function animate() { requestAnimationFrame(animate); TWEEN.update(); controls.update(); renderer.render(scene, camera); }

    function init() {
        initLighting();
        initCamera();
        initRenderer();
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.target.set(0,0,0);
        const dom = renderer.domElement;
        
        // 鼠标事件
        dom.addEventListener('click', onMouseClick);
        dom.addEventListener('dblclick', onMouseDoubleClick);
        // 触摸事件
        dom.addEventListener('touchstart', onTouchStart, { passive: false });
        dom.addEventListener('touchmove', onTouchMove);
        dom.addEventListener('touchend', onTouchEnd);
        
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            const w = container.clientWidth, h = container.clientHeight;
            const aspect = w/h;
            camera.left = -SYSTEM_CONFIG.frustumSize * aspect/2;
            camera.right = SYSTEM_CONFIG.frustumSize * aspect/2;
            camera.top = SYSTEM_CONFIG.frustumSize/2;
            camera.bottom = -SYSTEM_CONFIG.frustumSize/2;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
        
        const toggleRowBtn = document.getElementById('toggleRowBtn');
        const rowColoring = document.getElementById('rowColoring');
        toggleRowBtn.addEventListener('click', () => {
            const isHidden = rowColoring.classList.contains('hidden');
            if (isHidden) { rowColoring.classList.remove('hidden'); toggleRowBtn.innerText = '隐藏'; }
            else { rowColoring.classList.add('hidden'); toggleRowBtn.innerText = '显示'; }
        });
        
        document.getElementById('buildBtn').addEventListener('click', () => { const x=parseInt(document.getElementById('customSizeX').value)||3; const y=parseInt(document.getElementById('customSizeY').value)||3; const z=parseInt(document.getElementById('customSizeZ').value)||3; buildBox(x,y,z); });
        document.getElementById('clearAllBtn').addEventListener('click', clearAllCubes);
        document.getElementById('resetViewBtn').addEventListener('click', resetView);
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('resetAllMovedBtn').addEventListener('click', restoreAllMoved);
        document.getElementById('coloringNormal').addEventListener('click', () => setColoringMode('normal'));
        document.getElementById('coloring3Face').addEventListener('click', () => setColoringMode('3face'));
        document.getElementById('coloring2Face').addEventListener('click', () => setColoringMode('2face'));
        document.getElementById('coloring1Face').addEventListener('click', () => setColoringMode('1face'));
        document.getElementById('normalToggle').addEventListener('click', () => toggleDisplace('normal'));
        document.getElementById('threeToggle').addEventListener('click', () => toggleDisplace('3face'));
        document.getElementById('twoToggle').addEventListener('click', () => toggleDisplace('2face'));
        document.getElementById('oneToggle').addEventListener('click', () => toggleDisplace('1face'));
        
        buildBox(3, 3, 3);
        animate();
        updateStatus();
        updateToggleButtonsState();
    }
    init();
</script>
</body>
</html>
